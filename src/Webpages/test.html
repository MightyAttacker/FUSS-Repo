<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 250px;
            background-color: #333;
            color: white;
            padding: 20px;
        }
        .sidebar h2 {
            color: #fff;
        }
        .sidebar a {
            color: #fff;
            text-decoration: none;
            display: block;
            margin: 10px 0;
        }
        .sidebar a:hover {
            background-color: #575757;
            padding: 10px;
        }
        .main {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .card {
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .header {
            position:relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .header h1 {
            margin: 0;
        }
        .header .user-info {
            display: flex;
            align-items: center;
        }
        .header .user-info img {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Admin Dashboard</h1>
        <div class="user-info">
            <img src="path/to/profile-image.jpg" alt="User Profile">
            <span>Name</span>
            <span>Description</span>
            <button>Log out</button>
        </div>
    </div>
    <div class="container">
        <div class="sidebar">
            <h2>Admin</h2>
            <a href="#">Home</a>
            <a href="#">Browse Requests</a>
            <a href="#">Manage Profile</a>
            <a href="#">View Students</a>
            <a href="#">Manage Skill list</a>
            <a href="#">View Reports</a>
        </div>
        <div class="main">
            <div class="card">
                <h3>Active users graph</h3>
                <div style="height: 200px; background-color: #eaeaea;"></div>
            </div>
            <div class="card">
                <h3>Completed tasks graph</h3>
                <div style="height: 200px; background-color: #eaeaea;"></div>
            </div>
            <div class="card">
                <h3>Credit distribution</h3>
                <div style="height: 200px; background-color: #eaeaea;"></div>
            </div>
            <div class="card">
                <h3>Report graph</h3>
                <div style="height: 200px; background-color: #eaeaea;"></div>
            </div>
            <div class="card">
                <h3>Popular Skills (Pie Chart)</h3>
                <div style="height: 200px; background-color: #eaeaea;"></div>
            </div>
            <div class="card">
                <h3>Requests graph</h3>
                <div style="height: 200px; background-color: #eaeaea;"></div>
            </div>
        </div>
    </div>
</body>
</html>
