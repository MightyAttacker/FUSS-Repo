<!DOCTYPE html>
<html lang="en-AU"> 
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="./login.js"> </script>
    <title>FUSS Request Page</title>
</head>

<body>
  <div id="topBanner">
    <div id="flindersLogo">
     <img id="imgLogo" src="../images/Logo_Flinders_white.png" alt="Logo for Flinders University" id="flindersLogo">
    </div>
    <div id="title">  
    <header><h1>Flinders University Skill Share</h1> </header>
    </div>
        <div id="logoutButton">
          <input id="logButton" class="button" type="button" onclick="location.href='../studentLoginPage/studentLoginPage.html';" value="Logout" />
          </div>
  </div>
  
  <div id="sideBar">
    <ul class="sidebar">
      <li> <a href="#home">Home</a> </li>
      <li> <a class="active" href="#Requests"> Make A Request</a> </li>
      <li> <a href="#ViewRequests">View My Requests</a> </li>
      <li> <a href="#BrowseRequests">Browse Requests</a> </li>
      <li> <a href="#ManageProfile">Manage Profile</a> </li>
      <li> <a href="#History">History</a> </li>  
    </ul>
  </div>
  
    <main>
      <div id="Header">
        Create Service Request
      </div>
      <div id="requestForm"> 
        <form> 
        <div id="Title" class="requestFormItem"> 
            <label for="Title">Title</label> <br>
            <input class="requestFormItem" id="Title" type="text" name="Title" placeholder="Title">
        </div>
        
        <div id="Providername" class="requestFormItem"> 
          <p>Provider: <b> Grab Name </b></p>
        </div>
          
        <div id="dateAndTime">
          
          <input class="dateAndTime" type="date">
          <input class="dateAndTime" type="time">
          
        </div>
          
        <div id="credits" class="requestFormItem"> 
          
            <label for="offered_Credits">Credits Offered</label> <br>
            <input class="requestFormItem" id="offered_Credits" type="number" name="offered_Credits" placeholder="1">
            Current Credit Balance
          
        </div>
        <div id="notes" class="requestFormItem"> 
            <label for="Notes">Notes</label> <br>
            <input class="requestFormItem" id="Notes" type="text" name="Notes" placeholder="Notes...">
        </div>
        <div id="CourseSection" class="requestFormItem"> 
          <div id="CourseRelated" class="requestFormItem"> 
            
              <input class="requestFormItem" type="radio" id="courseRelated" name="CourseChoice" value="Course Related">
              <label for="CourseRelated"> Course Related </label> <br>
              <input class="requestFormItem" type="radio" id="notCourseRelated" name="CourseChoice" value="Not Course Related">
              <label for="notCourseRelated"> Not Course Related </label> <br>
            
          </div>
          <div id="CourseSelection" class="requestFormItem"> 

          </div>
          <div id="submitButtons">
        <button id="submit" type="submit" class="button"> Submit Request</button>
        <button id="Clear" type="reset" class="button"> Clear</button>
        </div>
        </div>
      </form>
      </div>
      <div id="calanderWidget">
        Calander goes here
      </div>
    </main>
</body>
</html>
