<!DOCTYPE html>
<html lang="en-AU"> 
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="login.css">
    <title>FUSS Login Page</title>
</head>

<body>
  <div id="topBanner">
    <div id="flindersLogo">
      <img src="./imgs/flindersLogo.png" alt="Logo for Flinders University" id="flindersLogo">
    </div>
      <header><h1>Flinders University Skill Share</h1> <header>
  </div>
  <main>
  <div id="loginCard">
      <form action="/login" method="post" id="loginForm">
      <div class="form-card">
        <h2>Login</h2>
          <div>
            <label for="email">Email:</label>
            <input class="form-item" type="text" id="email" name="email" required>
        </div>
        <br>
        <div>
            <label for="password">Password:</label>
            <input class="form-item" type="password" id="password" name="password" required>
        </div>
        <br>
        </div>
        <button id="login" type="submit" class="button">Login</button>
      <button id="register" type="submit" class="button">Register</button>
    </form>
    </div>
    </main>
</body>
</html>
