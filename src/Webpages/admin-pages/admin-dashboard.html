<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="header">
        <img id="logo" src="../admin-pages/images/Logo_Flinders_white.png" alt="Flinders University Logo">
        <div class="userprofile">
            <img id="userIcon" src="../admin-pages/images/usericon.png" alt="User Icon">
            <p>User name</p>
            <a href="../Webpages/Login Page/Login-Page.html"><button>Log out</button></a>
        </div>
        
    </div>

    <div class="navbarContainer">
         <ul class="navbar">
            <li><a class="active"href="admin-dashboard.html">Home</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="view-students.html">View Students</a></li>
            <li><a href="manage-skill-list.html">Manage Skill List</a></li>
            <li><a href="view-reports.html">View Reports</a></li>
        </ul>
    </div>

    <div class="container">
        <div id="users">
            <h3>Active users</h3>
            <p>Total users: <span id="totalUsers"></span></p>
            <p>Active users in the last 30 days: <span id="activeUsers"></span></p>
        </div>
        <div id="services">
            <h3>Active Services</h3>
        </div>
        <div class="inlinebox">
            FUSSCredit distribution
        </div>
        <div class="inlinebox">
            Popular Skills
        </div>
    </div>
    <script>
fetch('../admin-pages/admin-dashboard-data.php')
  .then(response => {
    if (!response.ok) {
      throw new Error('Network response was not ok');
    }
    return response.json();
  })
  .then(data => {
    console.log(data);
    document.getElementById('totalUsers').textContent = data.totalUsers ?? 'Error';
    document.getElementById('activeUsers').textContent = data.activeUsers ?? 'Error';
  })
  .catch(error => {
    console.error('Fetch error:', error);
    document.getElementById('totalUsers').textContent = 'Error';
    document.getElementById('activeUsers').textContent = 'Error';
  });

</script>
</body>
</html>
